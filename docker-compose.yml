services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mateon-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mateon_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      TZ: Asia/Seoul
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: mateon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mateon_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - mateon-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mateon_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mateon-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      TZ: Asia/Seoul
    ports:
      - "5050:80"
    volumes:
      - mateon-pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  mateon-postgres-data:
  mateon-pgadmin-data:

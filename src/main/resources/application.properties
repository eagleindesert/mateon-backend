spring.application.name=mateon

# 로컬 개발 시 .env 파일에서 값을 읽어옵니다 (없으면 무시).
# Docker 환경에서는 docker-compose 의 env_file/environment 로 주입됩니다.
spring.config.import=optional:file:.env[.properties]

# Docker Compose 지원 (로컬 개발용 인프라 자동 기동)
# bootRun 시 compose-dev.yml 의 postgres/pgadmin 을 자동으로 up 하고,
# datasource 접속 정보는 postgres 서비스에서 자동 연결됩니다.
spring.docker.compose.file=docker-compose-dev.yml
spring.docker.compose.lifecycle-management=start_and_stop

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mateon_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}

# JPA 설정
spring.jpa.show-sql=true
# 스키마는 Flyway 가 관리한다. Hibernate 는 엔티티↔실제 스키마 불일치를
# 부팅 시 검증만 하고(validate), 절대 스키마를 변경하지 않는다.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true

# Flyway (DB 마이그레이션)
# baseline-on-migrate: 기존 데이터가 있는 DB(클라우드)는 V1 을 "이미 적용됨"으로
# 처리하고 V2 부터 실행한다. 빈 DB(로컬)는 V1 부터 전부 실행한다.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Mail 설정 (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT 설정
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

openai.api.key=${OPENAI_API_KEY}
openai.api.model=${OPENAI_API_MODEL:gpt-4o-mini}

# AI 서버 (의도 추출/임베딩). 별도 FastAPI 서버 — POST /intents/extract 를 호출한다.
ai.base-url=${AI_BASE_URL:http://localhost:8000}
# AI 서버 인증용 공유 시크릿. 매 요청의 X-Internal-Secret 헤더로 보낸다. 필수 값이다.
# 주의: 기본값을 안 주는 것만으로는 부팅이 막히지 않는다. @ConfigurationProperties 바인딩은
#       해결 못 한 플레이스홀더를 원문 그대로 넣기 때문에, 실제 차단은 AiServerProperties
#       .validateInternalSecret() 이 한다.
ai.internal-secret=${AI_INTERNAL_SECRET}
# LLM+임베딩이라 응답이 수 초~수십 초 → read 는 넉넉히, connect 는 짧게.
ai.connect-timeout=${AI_CONNECT_TIMEOUT:3s}
ai.read-timeout=${AI_READ_TIMEOUT:60s}
# 이 시간 넘게 방치된 의도 추출 대화는 만료 처리하고 새로 시작한다.
ai.session-ttl=${AI_SESSION_TTL:24h}
# user_embeddings.embedding 이 vector(1536) 이므로 반드시 일치해야 한다.
ai.embedding-dimension=${AI_EMBEDDING_DIMENSION:1536}

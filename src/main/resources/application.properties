spring.application.name=mateon

# 로컬 개발 시 .env 파일에서 값을 읽어옵니다 (없으면 무시).
# Docker 환경에서는 docker-compose 의 env_file/environment 로 주입됩니다.
spring.config.import=optional:file:.env[.properties]

# Docker Compose 지원 (로컬 개발용 인프라 자동 기동)
# bootRun 시 compose-dev.yml 의 postgres/pgadmin 을 자동으로 up 하고,
# datasource 접속 정보는 postgres 서비스에서 자동 연결됩니다.
spring.docker.compose.file=docker-compose-dev.yml
spring.docker.compose.lifecycle-management=start_and_stop

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mateon_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}

# JPA 설정
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Mail 설정 (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT 설정
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

openai.api.key=${OPENAI_API_KEY}
openai.api.model=${OPENAI_API_MODEL:gpt-4o-mini}

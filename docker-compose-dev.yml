# 로컬 개발용 인프라 컨테이너 (postgres + pgadmin)
# Spring Boot Docker Compose 지원이 ./gradlew bootRun 시 자동으로 기동합니다.
# 배포용 전체 스택은 docker-compose.yml 을 사용하세요.
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mateon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mateon_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - mateon-postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mateon_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mateon-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      TZ: Asia/Seoul
    ports:
      - "5050:80"
    volumes:
      - mateon-pgadmin-dev-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  mateon-postgres-dev-data:
  mateon-pgadmin-dev-data:

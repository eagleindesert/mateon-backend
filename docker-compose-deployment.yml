# ARM 기반 클라우드 배포용 Compose
# ------------------------------------------------------------------------------
# 로컬에서 소스를 빌드하지 않고, DockerHub 에 이미 push 된 이미지를 pull 하여 실행합니다.
# (이미지는 scripts/docker/deploy-dockerhub.ps1 로 arm64 플랫폼으로 빌드/푸시하세요.
#   예: ./scripts/docker/deploy-dockerhub.ps1 -Tag v1.0.0 -Platform linux/arm64)
#
# 사용법 (배포 서버에서):
#   1) 이 파일과 .env 를 서버로 복사한다. (.env 에는 MAIL/JWT/AI 시크릿 포함)
#   2) DOCKERHUB_USERNAME / APP_IMAGE_TAG 를 .env 또는 셸 환경변수로 지정한다.
#   3) docker compose -f docker-compose-deployment.yml up -d
#
# 종료:  docker compose -f docker-compose-deployment.yml down
# 갱신:  docker compose -f docker-compose-deployment.yml pull && \
#        docker compose -f docker-compose-deployment.yml up -d
# ------------------------------------------------------------------------------
services:
  app:
    # DockerHub 이미지를 pull (빌드하지 않음). 태그 미지정 시 latest.
    image: ${DOCKERHUB_USERNAME:-eagleindesert}/mateon-backend:${APP_IMAGE_TAG:-latest}
    # ARM 클라우드에서 멀티아치가 아닌 이미지를 강제 지정하고 싶을 때 사용.
    # 이미지가 arm64 로 push 되어 있어야 정상 동작합니다.
    platform: linux/arm64
    container_name: mateon-app
    restart: unless-stopped
    # 애플리케이션 시크릿(MAIL/JWT/AI 등)은 .env 파일에서 주입
    env_file:
      - .env
    environment:
      # DB 는 아래 postgres 서비스로 연결 (compose 네트워크 내 서비스명)
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mateon_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      TZ: Asia/Seoul
    ports:
      - "${APP_PORT:-8081}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    container_name: mateon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mateon_db
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      TZ: Asia/Seoul
    # 외부에 DB 를 노출할 필요가 없다면 ports 블록은 주석 처리하세요(보안 권장).
    # ports:
      # - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - mateon-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d mateon_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mateon-pgadmin
    restart: unless-stopped
    environment:
      # 접속 계정/비밀번호는 .env 로 오버라이드 권장 (기본값은 개발용).
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      TZ: Asia/Seoul
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - mateon-pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  mateon-postgres-data:
  mateon-pgadmin-data:
